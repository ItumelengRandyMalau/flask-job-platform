{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div id="login_sin_row" class="row">

    <div id="form_pic" class="col-lg-6 col-md-12">
        <h1 style="font-weight:900;color:rgb(141,164,184);font-size:50px">
            JOIN OUR COMMUNITY
        </h1>

        <h4>
            JOBHUBSA has thousands of job seekers looking for entry-level jobs.
        </h4>
    </div>


    <div id="sign_up" class="col-lg-6 col-md-12">

        <div class="container">

            <div id="content1" class="content">

                <h2>JOBHUBSA</h2>
                <h4>Login to your account</h4>

                <form method="post">

                    <div class="input-cnt">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email" required>
                    </div>

                    <div class="input-cnt">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>

                    <div class="input-cnt">
                        <input onclick="update()" type="submit">
                    </div>

                </form>

            </div>

            <div class="login_text">
                <div style="font-size:small">Register a New Account?</div>
                <a style="font-size:large;padding:10px;" href="{{ url_for('signup') }}">
                    Sign Up
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
