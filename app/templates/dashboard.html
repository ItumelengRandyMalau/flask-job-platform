<h2>My Jobs</h2>

<a href="{{ url_for('post_job') }}">Post New Job</a>

<hr>

{% for job in jobs %}

<div class="job-card">

    <h3>{{ job.title }}</h3>

    <p>{{ job.company }} - {{ job.location }}</p>

    <a href="{{ url_for('edit_job', job_id=job.id) }}">Edit</a>

    <form action="{{ url_for('delete_job', job_id=job.id) }}" method="POST">
        <button type="submit">Delete</button>
    </form>

</div>

{% endfor %}
